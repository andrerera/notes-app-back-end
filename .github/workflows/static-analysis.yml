# .github/workflows/static-analysis.yml

name: Static Analysis

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  analyze:
    name: Code Quality & Security Analysis
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Run ESLint (from awesome-static-analysis)
      - name: Run ESLint
        run: npx eslint .

      # Step 5: Run Snyk SAST scan (from awesome-sca)
      - name: Run Snyk SAST scan
        run: |
          npm install -g snyk
          snyk auth ${{ secrets.SNYK_TOKEN }}
          snyk code test --severity-threshold=high
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Step 6: Run Snyk SCA (dependency scan)
      - name: Run Snyk SCA scan
        run: |
          snyk test --severity-threshold=high
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Step 7: Run npm audit (backup)
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      # Step 8: Check for outdated dependencies
      - name: Check outdated dependencies
        run: npm outdated || true
