# .github/workflows/static-analysis.yml

name: Static Analysis

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  analyze:
    name: Code Quality & Security Analysis
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # Step 3: Install dependencies (includes ESLint from package.json)
      - name: Install dependencies
        run: npm ci

      # Step 4: Run ESLint (use existing config, don't reinstall)
      - name: Run ESLint
        run: npx eslint .

      # Step 5: Run Snyk security scan (from awesome-sca)
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      # Step 6: Run npm audit (backup security check)
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      # Step 7: Check for outdated dependencies
      - name: Check outdated dependencies
        run: npm outdated || true
